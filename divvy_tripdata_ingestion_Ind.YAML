id: divvy_tripdata_ingestion_Ind
namespace: zoomcamp.project

inputs:
  - id: year
    type: SELECT
    values: [ "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024", "2025" ]
    defaults: "2024"
  - id: month
    type: SELECT
    values: [ "01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12" ]
    defaults: "01"

variables:
  gcp_bucket: "divvy_data_lake"
  gcp_project: "final-project-de-zoomcamp-2026"

tasks:
  - id: set_label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      data_period: "{{ inputs.year }}-{{ inputs.month }}"

  - id: python_ingest
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    beforeCommands:
      - pip install pandas pyarrow google-cloud-storage requests
    env:
      YEAR: "{{ inputs.year }}"
      MONTH: "{{ inputs.month }}"
      GCP_GCS_BUCKET: "{{ vars.gcp_bucket }}"
      GCP_CREDS_JSON: "{{ kv('GCP_CREDS') }}"
    script: |
      import os
      import io
      import json
      import requests
      import zipfile
      import pandas as pd
      from google.cloud import storage
      from google.oauth2 import service_account
      from urllib.parse import urljoin

      YEAR = os.environ.get("YEAR")
      MONTH = os.environ.get("MONTH")
      BUCKET = os.environ.get("GCP_GCS_BUCKET")
      CREDS_JSON = os.environ.get("GCP_CREDS_JSON")

      # FIX: Added trailing slash so urljoin works correctly
      BASE_URL = "https://divvy-tripdata.s3.amazonaws.com"

      def divvy_to_gcs(year, month):
          info = json.loads(CREDS_JSON)
          credentials = service_account.Credentials.from_service_account_info(info)
          client = storage.Client(credentials=credentials, project=info['project_id'])

          year = str(year).strip()
          month = str(month).strip()
          file_prefix = f"{year}{int(month):02d}-divvy-tripdata"
          zip_file_name = f"{file_prefix}.zip"
          request_url = urljoin(BASE_URL, zip_file_name)

          print(f"Downloading: {request_url}")
          r = requests.get(request_url)
          
          if r.status_code != 200:
              print(f"File {zip_file_name} not found. Skipping...")
              return

          with zipfile.ZipFile(io.BytesIO(r.content)) as z:
              csv_files = [f for f in z.namelist() if f.endswith('.csv') and not f.startswith('__')]
              for csv_file in csv_files:
                  with z.open(csv_file) as f:
                      df = pd.read_csv(f)
                      parquet_buffer = io.BytesIO()
                      df.to_parquet(parquet_buffer, engine='pyarrow', index=False)
                      
                      object_name = f"raw/divvy/{year}/{int(month):02d}/{csv_file.replace('.csv', '.parquet')}"
                      blob = client.bucket(BUCKET).blob(object_name)
                      
                      parquet_buffer.seek(0)
                      blob.upload_from_file(parquet_buffer)
                      print(f"Uploaded to gs://{BUCKET}/{object_name}")

      if __name__ == "__main__":
          divvy_to_gcs(YEAR, MONTH)

  - id: load_to_bq
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    retry:
      type: constant
      interval: PT30S  # Wait 30 seconds before retrying
      maxAttempts: 3   # Try 3 times before failing
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    projectId: "{{ vars.gcp_project }}"
    from:
      - "gs://{{ vars.gcp_bucket }}/raw/divvy/{{ inputs.year }}/{{ inputs.month }}/*.parquet"
    destinationTable: "{{ vars.gcp_project }}.divvy_trips_data.external_divvy_data"
    format: PARQUET
    #writeDisposition: WRITE_APPEND
    writeDisposition: WRITE_TRUNCATE
    createDisposition: CREATE_IF_NEEDED
    autodetect: true

  - id: dbt_workflow
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: git_clone
        type: io.kestra.plugin.git.Clone
        url: "https://github.com/annapurnachary/divvy-tripdata-pipeline"
        branch: main

      - id: dbt_transform
        type: io.kestra.plugin.dbt.cli.DbtCLI
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        env:
          GCP_PROJECT: "{{ vars.gcp_project }}"
          GCP_CREDS_JSON: "{{ kv('GCP_CREDS') }}"

        beforeCommands:
          - pip install dbt-bigquery
          # 1. Safely write the JSON to a file without interpreting special characters
          - |
            cat << 'EOF' > gcp_creds.json
            {{ kv('GCP_CREDS') }}
            EOF
          # 2. Create the profiles.yml pointing to that file
          - |
            cat << 'EOF' > profiles.yml
            final_project_divvy:
              outputs:
                dev:
                  type: bigquery
                  method: service-account
                  project: {{ vars.gcp_project }}
                  dataset: divvy_trips_data
                  threads: 4
                  keyfile: gcp_creds.json
                  priority: interactive
              target: dev
            EOF

        commands:
          # Use the absolute path to the dbt executable
          - /home/kestra/.local/bin/dbt deps
          - /home/kestra/.local/bin/dbt build
