id: divvy_master_ingestion
namespace: zoomcamp.project

inputs:
  - id: year
    type: SELECT
    values: ["2023", "2024", "2025"]
    defaults: "2024"

tasks:
  - id: for_each_month
    type: io.kestra.plugin.core.flow.ForEach
    values: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"]
    concurrencyLimit: 1
    tasks:
      - id: trigger_monthly_ingest
        type: io.kestra.plugin.core.flow.Subflow
        namespace: zoomcamp.project
        flowId: divvy_tripdata_v2
        inputs:
          year: "{{ inputs.year }}"
          month: "{{ taskrun.value }}"
        wait: true
        transmitFailed: true

  - id: trigger_dbt
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp.project
    flowId: divvy_dbt_transform
    wait: true